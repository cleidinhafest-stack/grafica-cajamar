<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gráfica Cajamar</title>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }

header {
    background:#000;
    color:#FFD700;
    padding:15px;
    text-align:center;
}

.container { max-width:1100px; margin:auto; padding:20px; }

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card {
    background:#fff;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img { width:100%; border-radius:8px; }

.btn {
    background:#25D366;
    color:#fff;
    padding:10px;
    text-align:center;
    border-radius:6px;
    cursor:pointer;
    margin-top:10px;
}

.produto-detalhe { display:none; background:#fff; padding:20px; border-radius:10px; }

select, input { width:100%; padding:10px; margin:10px 0; }

.preco { font-size:22px; font-weight:bold; color:green; }

footer {
    background:#000;
    color:#fff;
    text-align:center;
    padding:20px;
    margin-top:20px;
}
</style>
</head>

<body>

<header>
    <h1>GRÁFICA CAJAMAR</h1>
</header>

<div class="container">

    <h2>Produtos</h2>

    <div class="grid">

        <div class="card">
            <img src="https://via.placeholder.com/300x200">
            <h3>Adesivo em Vinil</h3>
            <div class="btn" onclick="abrirProduto('adesivo')">Ver opções</div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x200">
            <h3>Cartão de Visita</h3>
            <div class="btn" onclick="abrirProduto('cartao')">Ver opções</div>
        </div>

    </div>

    <!-- PRODUTO ADESIVO -->
    <div id="adesivo" class="produto-detalhe">
        <h2>Adesivo em Vinil</h2>

        <label>Tamanho:</label>
        <select id="tamA" onchange="calcAdesivo()">
            <option value="5">Pequeno</option>
            <option value="10">Médio</option>
            <option value="20">Grande</option>
        </select>

        <label>Material:</label>
        <select id="matA" onchange="calcAdesivo()">
            <option value="1">Vinil Fosco</option>
            <option value="1.2">Vinil Brilho</option>
            <option value="1.5">Transparente</option>
        </select>

        <label>Quantidade:</label>
        <input type="number" id="qtdA" value="10" onchange="calcAdesivo()">

        <div class="preco">R$ <span id="totalA">50</span></div>

        <div class="btn" onclick="comprarAdesivo()">Pedir no WhatsApp</div>
    </div>

</div>

<footer>
    <p>Gráfica Cajamar</p>
    <p>Rua dos Alecrins, 656</p>
    <p>WhatsApp: (11) 99575-9555</p>
</footer>

<script>
function abrirProduto(id) {
    document.querySelectorAll('.produto-detalhe').forEach(e => e.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

function calcAdesivo() {
    let tam = document.getElementById("tamA").value;
    let mat = document.getElementById("matA").value;
    let qtd = document.getElementById("qtdA").value;

    let total = tam * mat * qtd;

    document.getElementById("totalA").innerText = total.toFixed(2);
}

function comprarAdesivo() {
    let total = document.getElementById("totalA").innerText;

    let msg = `Olá! Quero comprar Adesivo\nTotal: R$ ${total}`;

    window.open(`https://wa.me/5511995759555?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
